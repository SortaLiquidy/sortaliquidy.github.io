      <script>
        function calculateAge(birthDate) {
        const today = new Date();
        const birthDateObj = new Date(birthDate);
        let age = today.getFullYear() - birthDateObj.getFullYear();
        const monthDifference = today.getMonth() - birthDateObj.getMonth();
        if (monthDifference < 0 || (monthDifference === 0 && today.getDate() < birthDateObj.getDate())) {
          age--;
        }
        return age;
      }
      const birthDate = '2011-04-01';
        document.getElementById('ageDisplay').textContent = `🎂 ${calculateAge(birthDate)}yr`;

  <div id="duckContainer">
    <div id="duckWrapper">
      <img src="/assets/duck.gif" alt="Duck" id="duck">
    </div>
  </div>
  <script>
    const duck = document.getElementById("duckContainer");
    const stepDuration = 0.46;
    const strideLength = 30;
    function setDuckSpeed() {
      const distance = window.innerWidth + 300;
      const stepsNeeded = distance / strideLength;
      const duration = stepsNeeded * stepDuration;
      duck.style.animationDuration = `${duration}s`;
    }
    window.addEventListener("resize", setDuckSpeed);
    setDuckSpeed();
  </script>
  <img id="notJumpscare" src="/assets/notJumpscare.jpg" />
  <audio id="happyMusic" src="/assets/happyMusic.mp3" preload="auto"></audio>

  <script>
    const notJumpscare = document.getElementById("notJumpscare");
    const happyMusic = document.getElementById("happyMusic");
    const duckBtn = document.getElementById("duck");

    duckBtn.addEventListener("click", function () {
      audio.volume = 0.2;
      happyMusic.currentTime = 0;
      happyMusic.play();
      
      notJumpscare.classList.add("invert");

      happyMusic.onended = function() {
        notJumpscare.classList.remove("invert");
        audio.volume = 1.0;
      };
    });
  </script>
  <script>
    (function() {
      const domain = encodeURIComponent(window.location.hostname);
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const page_path = window.location.pathname;
      const page_title = document.title;
      const referrer = document.referrer;
  
      let search_query = '';
      if (referrer) {
        try {
          const url = new URL(referrer);
          if (url.hostname.includes('google.com')) {
            search_query = url.searchParams.get('q') || '';
          } else if (url.hostname.includes('bing.com')) {
            search_query = url.searchParams.get('q') || '';
          } else if (url.hostname.includes('yahoo.com')) {
            search_query = url.searchParams.get('p') || '';
          } else if (url.hostname.includes('duckduckgo.com')) {
            search_query = url.searchParams.get('q') || '';
          }
        } catch (e) {
        }
      }

      fetch('https://visitor.6developer.com/visit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          domain, 
          timezone,
          page_path,
          page_title,
          referrer,
          search_query
        })
      })
      .then(response => response.json())
      .then(data => {
        console.log('Visitor count:', data);
        if (document.getElementById('visitor-count')) {
          document.getElementById('visitor-count').textContent = data.totalCount;
        }
      })
      .catch(error => console.error('Error:', error));
    })();
  </script>
